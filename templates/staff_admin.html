{% extends "base.html" %}

{% block content %}
<section>
    <h2>Staff Admin</h2>
    <p>Admin actions are accepted only for staff with admin permission.</p>
</section>

<section>
    <h3>Add Airport</h3>
    <form method="post">
        <input type="hidden" name="action" value="add_airport">
        <label>Airport code <input name="airport_code" maxlength="3" required></label>
        <label>Airport name <input name="airport_name" required></label>
        <label>City name <input name="city_name" required></label>
        <button type="submit">Add Airport</button>
    </form>
</section>

<section>
    <h3>Add Airplane</h3>
    <form method="post">
        <input type="hidden" name="action" value="add_airplane">
        <label>Airplane id <input type="number" name="airplane_id" required></label>
        <label>Seats <input type="number" name="seats" required></label>
        <button type="submit">Add Airplane</button>
    </form>
</section>

<section>
    <h3>Create Flight</h3>
    <form method="post">
        <input type="hidden" name="action" value="create_flight">
        <label>Flight number <input name="flight_num" required></label>
        <label>Departure airport <input name="departure_airport" maxlength="3" required></label>
        <label>Departure display time <input type="datetime-local" name="departure_time" required></label>
        <label>Departure UTC time <input type="datetime-local" name="departure_time_utc" required></label>
        <label>Arrival airport <input name="arrival_airport" maxlength="3" required></label>
        <label>Arrival display time <input type="datetime-local" name="arrival_time" required></label>
        <label>Arrival UTC time <input type="datetime-local" name="arrival_time_utc" required></label>
        <label>Price <input type="number" step="0.01" name="price" required></label>
        <label>Airplane id <input type="number" name="airplane_id" required></label>
        <button type="submit">Create Flight</button>
    </form>
</section>

<section>
    <h3>Associate Agent</h3>
    <form method="post">
        <input type="hidden" name="action" value="associate_agent">
        <label>Agent email <input type="email" name="agent_email" required></label>
        <button type="submit">Associate With My Airline</button>
    </form>
</section>
{% endblock %}
